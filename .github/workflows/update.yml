name: Daily update & deploy

on:
  schedule:
    # 22:00 UTC = 07:00 JST（日本時間の朝）に日次実行
    - cron: '0 22 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]

# GitHub Pages デプロイに必要な権限 + data/ の自動コミット用
permissions:
  contents: write
  pages: write
  id-token: write

# 同時実行を1本に絞る（cronとpushの競合防止）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 外部依存ゼロだが、将来のためにキャッシュ可能な install ステップを用意
      - name: Install deps
        run: npm ci || npm install

      - name: Run unit tests
        run: npm test

      # vegetan（ベジ探）が本命の日次ソース。commodity は2017年で凍結済みの
      # アーカイブなので、失敗しても差分ゼロで無害（どちらも fail-safe 設計で
      # エラー時は既存 data/ を変更せず exit 0）。
      - name: Fetch vegetable prices (vegetan, fail-safe)
        run: node scripts/fetch.mjs --source=vegetan

      # 都市別小売価格は月次調査。日々の実行では多くの場合差分ゼロだが、月替わりで
      # 新しい月の値を取り込む。fail-safe 設計なので失敗しても既存 data/ は不変。
      - name: Fetch city retail prices (retail, monthly, fail-safe)
        run: node scripts/fetch.mjs --source=retail

      # e-Stat「青果物卸売市場調査」は年次公表。既取得年のデータがあれば API 呼び出し
      # ゼロで即終了する（毎日叩かない）。ESTAT_APP_ID は Secret 優先・無ければ Variable。
      # fail-safe 設計なので、未設定・失敗時も既存 data/ は不変で exit 0。
      - name: Fetch estat 青果 origin/region prices (annual, fail-safe)
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID || vars.ESTAT_APP_ID }}
        run: node scripts/fetch.mjs --source=estat

      - name: Fetch commodity archive (fail-safe)
        run: node scripts/fetch.mjs --source=commodity

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily price update [skip ci]"
            git push
          fi

      - name: Build site
        run: node scripts/build.mjs

      # 日次のSNS投稿（X）。新しい集計日のとき「買い時/値動き」+リンクの投稿文を用意。
      # 既定は手動投稿モード（social.x.autoPost=false）で、data/social/x-draft.md に
      # コピペ用の投稿文＋ワンタップ投稿リンクを生成するだけ（X APIの費用ゼロ）。
      # autoPost=true かつ Secrets 設定時のみ API で自動投稿（1日1回・冪等）。認証情報は
      # Secrets のみ・値はログ出力しない。未設定・API失敗でも fail-safe で exit 0。
      # 完全停止は config/site.json の social.x.enabled=false。
      - name: Prepare/Post to X (fail-safe)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/post-x.mjs

      # 投稿状態（x-state.json）に差分があれば github-actions[bot] 名義でコミット。
      # [skip ci] でこのコミットが再度ワークフローを起動しないようにする。
      - name: Commit social state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/social/
          if git diff --cached --quiet; then
            echo "No social state changes to commit."
          else
            git commit -m "chore(social): update X post state [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages サイト未作成なら Actions から自動作成を試みる
          # (プライベートリポジトリ+無料プランでは失敗する。その場合は
          #  リポジトリを public にするか Settings > Pages で有効化が必要)
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
