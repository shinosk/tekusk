name: Probe production data sources

# Manual-only: probes candidate production data-source endpoints (Tokyo
# wholesale market, ALIC "Vegetan", MAFF, e-Stat — see docs/data-sources.md)
# from a GitHub Actions runner, which (unlike this repo's dev sandbox) is
# expected to have normal internet egress. Results are saved to
# data/raw-samples/ and committed back to the branch that triggered the run,
# so a follow-up development session can inspect real responses and write
# the `estat` adapter's parser against them instead of guessing.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run probe (fail-safe, always exits 0)
        run: node scripts/probe.mjs

      - name: Commit raw samples if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw-samples/
          if git diff --cached --quiet; then
            echo "No probe changes to commit."
          else
            git commit -m "chore(probe): update raw-samples from production runner [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
